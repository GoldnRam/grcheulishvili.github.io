baseURL = 'https://ieri.sh/'
languageCode = 'en-us'
title = "IERI.SH"
theme = ["github.com/imfing/hextra"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    style = "dracula" 

[params]
  # Professional mission statement
  description = "Offensive systems research and architecture. Methodical exploration of C2 development, Web3 security, and systems engineering."
  favicon = "/favicon.ico"

  # Author block for internal theme logic compatibility
  [params.author]
    name = "George"
    email = "george@ieri.sh"

  [params.theme]
    default = "dark"
    displayToggle = false 

  [params.search]
    enable = true
    type = "flexsearch"

  [params.sidebar]
    enable = true
    autoCollapse = true
    displayTitle = true

  [params.footer]
    enable = true
    displayCopyright = true
    width = "wide"

  [params.navbar]
    displayTitle = true
    displayLogo = true

  [params.navbar.logo]
      path = "/images/logo.png"
      link = "/"
      width = 40 
      height = 40
